name: Test Rust bindings

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build
      run: |
        cargo build --verbose
      shell: bash

    # Disabled testing as uinput / uhid doesn't work in Github Actions.
    # - name: Run tests
    #   run: |
    #     cargo test --verbose
    #   shell: bash

    - name: Machete
      uses: bnjbvr/cargo-machete@main
